<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CoinGrid Password Generator</title>

<style>

body{

background:#0f172a;

color:white;

font-family:Arial,sans-serif;

max-width:700px;

margin:40px auto;

padding:20px;

}

input{

width:100%;

padding:15px;

font-size:16px;

margin-bottom:15px;

border-radius:10px;

border:none;

}

button{

padding:15px 25px;

background:#facc15;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

textarea{

width:100%;

height:180px;

margin-top:20px;

padding:15px;

font-size:14px;

border-radius:10px;

}

</style>

</head>

<body>

<h2>CoinGrid Password Hash Generator</h2>

<input
id="password"
type="password"
placeholder="Enter Password">

<button
onclick="generateHash()">

Generate Hash

</button>

<textarea
id="result"
readonly></textarea>

<script>

const API_BASE =
"https://coingrid-api.coingridcoingrid.workers.dev";

async function generateHash(){

const password =
document.getElementById(
"password"
).value.trim();

if(!password){

alert(
"Enter a password."
);

return;

}

try{

const response =
await fetch(

`${API_BASE}/auth/generate-password-hash`,

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

password

})

}

);

const data =
await response.json();

if(!response.ok || !data.success){

alert(

data.message ||

"Unable to generate hash."

);

return;

}

document.getElementById(
"result"
).value = data.hash;

}catch(error){

console.error(

"Hash Generation Error:",

error

);

alert(
"Unable to connect to server."
);

}

}

</script>

</body>
</html>
