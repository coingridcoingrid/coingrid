<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CoinGrid Password Generator</title>

<style>

body{

background:#0f172a;

color:white;

font-family:Arial,sans-serif;

max-width:700px;

margin:40px auto;

padding:20px;

}

input{

width:100%;

padding:15px;

font-size:16px;

margin-bottom:15px;

border-radius:10px;

border:none;

}

button{

padding:15px 25px;

background:#facc15;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

}

textarea{

width:100%;

height:180px;

margin-top:20px;

padding:15px;

font-size:14px;

border-radius:10px;

}

</style>

</head>

<body>

<h2>CoinGrid Password Hash Generator</h2>

<input
id="password"
type="password"
placeholder="Enter Password">

<button
onclick="generateHash()">

Generate Hash

</button>

<textarea
id="result"
readonly></textarea>

<script type="module">

import {

hashPassword

}

from "../password.js";

window.generateHash =
async function(){

const password =
document.getElementById(
"password"
).value;

if(!password){

alert(
"Enter a password."
);

return;

}

const hash =
await hashPassword(
password
);

document.getElementById(
"result"
).value = hash;

};

</script>

</body>
</html>
