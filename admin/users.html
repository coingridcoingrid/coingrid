<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Users Management | CoinGrid</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
overflow-x:hidden;
}

.dashboard{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#020617;
position:fixed;
left:0;
top:0;
height:100vh;
padding:25px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,.08);
z-index:1000;
}

.logo{
font-size:32px;
font-weight:800;
color:#facc15;
text-align:center;
margin-bottom:40px;
}

.nav-links{
display:flex;
flex-direction:column;
gap:12px;
}

.nav-links a{
background:#0f172a;
padding:15px;
border-radius:12px;
color:#cbd5e1;
text-decoration:none;
transition:.3s;
}

.nav-links a:hover{
background:#1e293b;
}

.nav-links a.active{
background:#facc15;
color:#000;
font-weight:700;
}

/* MAIN */

.main-content{
margin-left:280px;
flex:1;
padding:30px;
}

/* HEADER */

.page-header{
margin-bottom:30px;
}

.page-header h1{
font-size:36px;
margin-bottom:8px;
}

.page-header p{
color:#94a3b8;
}

/* MOBILE MENU */

.menu-btn{
display:none;
font-size:28px;
cursor:pointer;
margin-bottom:15px;
}

/* STATS */

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

.stat-card h2{
font-size:30px;
color:#facc15;
margin-bottom:10px;
}

.stat-card p{
color:#94a3b8;
}

/* SEARCH */

.search-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-bottom:30px;
}

.search-card input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#1e293b;
color:white;
}

/* USER LIST */

.users-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

.users-card h2{
margin-bottom:20px;
color:#facc15;
}

.user-row{
display:grid;
grid-template-columns:2fr 2fr 1fr 1fr;
gap:15px;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.header{
font-weight:700;
color:#facc15;
}

.active{
color:#22c55e;
font-weight:700;
}

/* PART 2 CSS PASTE HERE */
.actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.view-btn,
.suspend-btn,
.delete-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:13px;
font-weight:600;
}

.view-btn{
background:#3b82f6;
color:white;
}

.suspend-btn{
background:#f59e0b;
color:white;
}

.delete-btn{
background:#ef4444;
color:white;
}

.popup-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:90%;
max-width:500px;
}

.popup-box h2{
margin-bottom:15px;
color:#facc15;
}

.popup-box p{
color:#cbd5e1;
line-height:1.7;
}

.popup-close{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#facc15;
color:#000;
font-weight:700;
cursor:pointer;
}

/* PART 3 */

  .activity-card{
margin-top:30px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

.activity-card h2{
color:#facc15;
margin-bottom:20px;
}

.activity-row{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:15px;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.analytics-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.analytics-box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
text-align:center;
}

.analytics-box h2{
color:#facc15;
margin-bottom:10px;
}

@media(max-width:768px){

.analytics-grid{
grid-template-columns:1fr;
}

.activity-row{
grid-template-columns:1fr;
}

}
@media(max-width:991px){

.sidebar{
left:-100%;
transition:.3s;
}

.sidebar.active{
left:0;
}

.main-content{
margin-left:0;
}

.menu-btn{
display:block;
}

.stats-grid{
grid-template-columns:1fr 1fr;
}

.user-row{
grid-template-columns:1fr;
}

}

@media(max-width:600px){

.stats-grid{
grid-template-columns:1fr;
}

.page-header h1{
font-size:28px;
}

}

</style>

</head>
<body>

<div class="dashboard">

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">

<div class="logo">
CoinGrid
</div>

<div class="nav-links">

<a href="dashboard.html">
📊 Dashboard
</a>

<a href="users.html" class="active">
👥 Users
</a>

<a href="sponsors.html">
🏢 Sponsors
</a>

<a href="tasks.html">
📋 Tasks
</a>

<a href="payouts.html">
💰 Payouts
</a>

<a href="reports.html">
📑 Reports
</a>

<a href="settings.html">
⚙ Settings
</a>
<a href="#"
onclick="adminLogout()">

🚪 Logout

</a>
</div>

</div>

<!-- MAIN -->

<div class="main-content">

<div class="menu-btn" id="menuBtn">
☰
</div>

<div class="page-header">

<h1>User Management</h1>

<p>
Manage all registered CoinGrid users.
</p>

</div>

<!-- USER STATS -->

<div class="stats-grid">

<div class="stat-card">
<h2 id="totalUsers">0</h2>
<p>Total Users</p>
</div>

<div class="stat-card">
<h2 id="verifiedUsers">0</h2>
<p>Verified Users</p>
</div>

<div class="stat-card">
<h2 id="emailUsers">0</h2>
<p>Email Accounts</p>
</div>

<div class="stat-card">
<h2 id="googleUsers">0</h2>
<p>Google Accounts</p>
</div>

</div>

<!-- SEARCH USERS -->

<div class="search-card">

<input
id="searchInput"
type="text"
placeholder="Search users by name, email or ID...">

</div>

<!-- USER LIST -->
<div class="users-card">

<h2>Users List</h2>

<div class="user-row header">

<div>Name</div>
<div>Email</div>
<div>Provider</div>
<div>Verified</div>

</div>

<div id="userList"></div>

</div>



  
<script>

const API_BASE =
"https://coingrid-api.coingridcoingrid.workers.dev";

const menuBtn =
document.getElementById("menuBtn");

const sidebar =
document.getElementById("sidebar");

menuBtn.addEventListener("click",()=>{

sidebar.classList.toggle("active");

});

async function loadUsers(){

try{

const response =
await fetch(

`${API_BASE}/api/admin/users`,

{

credentials:"include"

}

);

if(response.status===401){

window.location.replace(
"login.html"
);

return;

}

const data =
await response.json();

if(!data.success){

window.location.replace(
"login.html"
);

return;

}

document.getElementById("totalUsers").textContent =
data.stats.total_users;

document.getElementById("verifiedUsers").textContent =
data.stats.verified_users;

document.getElementById("emailUsers").textContent =
data.stats.email_users;

document.getElementById("googleUsers").textContent =
data.stats.google_users;

const userList =
document.getElementById("userList");

userList.innerHTML="";

data.users.forEach(user=>{

userList.innerHTML += `

<div class="user-row">

<div>${user.name || "-"}</div>

<div>${user.email}</div>

<div>${user.provider}</div>

<div>${user.email_verified ? "✅" : "❌"}</div>

</div>

`;

});

}catch(error){

console.error(

"Users Load Error:",

error

);

alert(

"Unable to load users."

);

}

}

(async()=>{

await loadUsers();

})();

  document.getElementById(

"searchInput"

).addEventListener(

"input",

function(){

const keyword =
this.value.toLowerCase();

document
.querySelectorAll(".user-row")
.forEach((row,index)=>{

if(index===0)return;

row.style.display=
row.textContent
.toLowerCase()
.includes(keyword)
? ""
: "none";

});

});


  async function adminLogout(){

await fetch(

`${API_BASE}/auth/admin-logout`,

{

method:"POST",

credentials:"include"

}

);

window.location.replace(
"login.html"
);

}
</script>

</body>
</html>
