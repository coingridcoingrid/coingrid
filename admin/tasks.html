<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Task Management | CoinGrid</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:#fff;
overflow-x:hidden;
}

.dashboard{
display:flex;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:280px;
background:#020617;
position:fixed;
left:0;
top:0;
height:100vh;
padding:25px;
overflow-y:auto;
border-right:1px solid rgba(255,255,255,.08);
z-index:1000;
}

.logo{
font-size:32px;
font-weight:800;
color:#facc15;
text-align:center;
margin-bottom:40px;
}

.nav-links{
display:flex;
flex-direction:column;
gap:12px;
}

.nav-links a{
background:#0f172a;
padding:15px;
border-radius:12px;
color:#cbd5e1;
text-decoration:none;
}

.nav-links a.active{
background:#facc15;
color:#000;
font-weight:700;
}

/* MAIN */

.main-content{
margin-left:280px;
flex:1;
padding:30px;
}

.page-header{
margin-bottom:30px;
}

.page-header h1{
font-size:36px;
margin-bottom:8px;
}

.page-header p{
color:#94a3b8;
}

.menu-btn{
display:none;
font-size:28px;
cursor:pointer;
margin-bottom:15px;
}

/* STATS */

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

.stat-card h2{
font-size:30px;
color:#facc15;
margin-bottom:10px;
}

/* SEARCH */

.search-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:20px;
border-radius:20px;
margin-bottom:30px;
}

.search-card input{
width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#1e293b;
color:white;
}
.form-group{
margin-bottom:18px;
}

.form-group label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.form-group input,
.form-group textarea,
.form-group select{

width:100%;
padding:14px;
border:none;
outline:none;
border-radius:12px;
background:#1e293b;
color:#fff;

}

.form-group textarea{
height:120px;
resize:none;
}
/* TASK LIST */

.tasks-card{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

.tasks-card h2{
margin-bottom:20px;
color:#facc15;
}

.task-row{
display:grid;
grid-template-columns:2fr 1.5fr 1fr 1fr;
gap:15px;
padding:15px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.header{
font-weight:700;
color:#facc15;
}

.pending{
color:#f59e0b;
font-weight:700;
}

/* PART 2  */

  .actions{
display:flex;
gap:8px;
flex-wrap:wrap;
}

.view-btn,
.approve-btn,
.reject-btn{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:13px;
font-weight:600;
}

.view-btn{
background:#3b82f6;
color:white;
}

.approve-btn{
background:#22c55e;
color:white;
}

.reject-btn{
background:#ef4444;
color:white;
}

.popup-overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
justify-content:center;
align-items:center;
z-index:9999;
}

.popup-box{
background:#1e293b;
padding:30px;
border-radius:20px;
width:90%;
max-width:550px;
}

.popup-box h2{
color:#facc15;
margin-bottom:15px;
}

.popup-box p{
color:#cbd5e1;
line-height:1.7;
}

.popup-close{
margin-top:20px;
padding:12px 20px;
border:none;
border-radius:10px;
background:#facc15;
color:#000;
font-weight:700;
cursor:pointer;
}

/* PART 3  */

  .activity-card{
margin-top:30px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
}

.activity-card h2{
color:#facc15;
margin-bottom:20px;
}

.activity-row{
display:grid;
grid-template-columns:1fr 2fr 1fr;
gap:15px;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.analytics-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.analytics-box{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
padding:25px;
border-radius:20px;
text-align:center;
}

.analytics-box h2{
color:#facc15;
margin-bottom:10px;
}

.approved-count{
color:#22c55e;
}

.pending-count{
color:#f59e0b;
}

@media(max-width:768px){

.analytics-grid{
grid-template-columns:1fr;
}

.activity-row{
grid-template-columns:1fr;
}

}

@media(max-width:991px){

.sidebar{
left:-100%;
transition:.3s;
}

.sidebar.active{
left:0;
}

.main-content{
margin-left:0;
}

.menu-btn{
display:block;
}

.stats-grid{
grid-template-columns:1fr 1fr;
}

.task-row{
grid-template-columns:1fr;
}

}

@media(max-width:600px){

.stats-grid{
grid-template-columns:1fr;
}

.page-header h1{
font-size:28px;
}

}

</style></head>
<body><div class="dashboard"><div class="sidebar" id="sidebar"><div class="logo">
CoinGrid
</div><div class="nav-links"><a href="dashboard.html">📊 Dashboard</a>
<a href="users.html">👥 Users</a>
<a href="sponsors.html">🏢 Sponsors</a>
<a href="tasks.html" class="active">📋 Tasks</a>
<a href="payouts.html">💰 Payouts</a>
<a href="reports.html">📑 Reports</a>
<a href="settings.html">⚙ Settings</a>

</div></div><div class="main-content"><div class="menu-btn" id="menuBtn">
☰
</div><div class="page-header"><h1>Task Management</h1><p>
Manage and review all tasks across CoinGrid.
</p></div><!-- TASK STATS --><div class="stat-card">
<h2 id="totalTasks">0</h2>
<p>Total Tasks</p>
</div>
<!-- TASK STATS -->

<div class="stats-grid">
  
<div class="stat-card">
<h2 id="featuredTasks">0</h2>
<p>Featured Tasks</p>
</div>

<div class="stat-card">
<h2 id="activeTasks">0</h2>
<p>Active Tasks</p>
</div>

<div class="stat-card">
<h2 id="inactiveTasks">0</h2>
<p>Inactive Tasks</p>
</div>
</div>
  <!-- SEARCH TASKS --><div class="search-card"><input
type="text"
placeholder="Search tasks by title, sponsor or ID...">

</div>
  
  <!-- ADD NEW TASK -->

<div class="tasks-card" style="margin-bottom:30px;">

<h2>Add New Task</h2>

<div class="form-group">
<label>Task Title</label>
<input type="text" id="taskTitle">
</div>

<div class="form-group">
<label>Short Description</label>
<textarea id="taskDescription"></textarea>
</div>

<div class="form-group">
<label>Reward ($)</label>
<input type="number" id="taskReward" step="0.01">
</div>

<div class="form-group">
<label>Category</label>
<input type="text" id="taskCategory">
</div>

<div class="form-group">
<label>Required Pass Level</label>
<input type="number" id="taskPassLevel" value="1">
</div>

  <div class="form-group">

<label>

Task Redirect URL

</label>

<input
type="url"
id="taskRedirectUrl"
placeholder="https://example.com/task-page">

  </div>

  <div class="form-group">

<label>Thumbnail URL</label>

<input
type="url"
id="taskThumbnail"
placeholder="https://example.com/image.webp">

  </div>
  
<div class="form-group">
<label>Status</label>

<select id="taskStatus">

<option value="active">
Active
</option>

<option value="inactive">
Inactive
</option>

</select>

</div>

<div class="form-group">

<label>

<input
type="checkbox"
id="taskFeatured">

 Featured Task

</label>

</div>

<button
id="addTaskBtn"
class="approve-btn"
style="padding:15px 30px;">

➕ Create Task

</button>

</div>
  
  <!-- TASK LIST --><div class="tasks-card">

<h2>Task List</h2>

<div class="task-row header">

<div>Title</div>

<div>Category</div>

<div>Reward</div>

<div>Status</div>

</div>

<div id="taskList"></div>

</div>
  
  <!-- PART 2 -->
<!-- TASK ACTIONS -->


  
  <script>

const menuBtn =
document.getElementById("menuBtn");

const sidebar =
document.getElementById("sidebar");

menuBtn.addEventListener("click",()=>{

sidebar.classList.toggle("active");

});
const API_BASE =
"https://coingrid-api.coingridcoingrid.workers.dev";

    

async function createTask(){

try{

const response =
await fetch(
`${API_BASE}/api/admin/tasks`,
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

title:
document.getElementById("taskTitle").value,

description:
document.getElementById("taskDescription").value,

reward:Number(
document.getElementById("taskReward").value
),

category:
document.getElementById("taskCategory").value,

required_pass_level:Number(
document.getElementById("taskPassLevel").value
),

featured:
document.getElementById("taskFeatured").checked,

status:
document.getElementById("taskStatus").value,

  redirect_url:
document.getElementById("taskRedirectUrl").value,

  thumbnail:
document.getElementById("taskThumbnail").value,

})

}

);

const data =
await response.json();

alert(data.message);

if(data.success){

document.getElementById("taskTitle").value="";
document.getElementById("taskDescription").value="";
document.getElementById("taskReward").value="";
document.getElementById("taskCategory").value="";
document.getElementById("taskPassLevel").value=1;
document.getElementById("taskFeatured").checked=false;
document.getElementById("taskStatus").value="active";
  document.getElementById("taskThumbnail").value="";
document.getElementById("taskRedirectUrl").value="";
loadTasks();

}

}catch(error){

console.error(error);

}

}

async function loadTasks(){

try{

const response =
await fetch(`${API_BASE}/api/admin/tasks`);

const data =
await response.json();

if(!data.success){

alert(data.message);

return;

}

document.getElementById("totalTasks").textContent =
data.stats.total_tasks;

document.getElementById("featuredTasks").textContent =
data.stats.featured_tasks;

document.getElementById("activeTasks").textContent =
data.stats.active_tasks;

document.getElementById("inactiveTasks").textContent =
data.stats.inactive_tasks;

const taskList =
document.getElementById("taskList");

taskList.innerHTML="";

data.tasks.forEach(task=>{

taskList.innerHTML += `

<div class="task-row">

<div>${task.title}</div>

<div>${task.category}</div>

<div>$${Number(task.reward).toFixed(2)}</div>

<div>${task.status}</div>

</div>

`;

});

}catch(error){

console.error(error);

}

}
    loadTasks();

document
.getElementById("addTaskBtn")
.addEventListener(
"click",
createTask
);
</script></body>
