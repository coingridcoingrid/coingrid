<!DOCTYPE html><html lang="en"><head>

<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Profile | CoinGrid</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:25px;
}

.container{
max-width:1200px;
margin:auto;
}

.profile-header{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:25px;
padding:35px;
display:flex;
align-items:center;
gap:25px;
flex-wrap:wrap;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:#facc15;
color:#000;
font-size:42px;
font-weight:800;
display:flex;
align-items:center;
justify-content:center;
}

.profile-info h1{
margin-bottom:10px;
}

.profile-info p{
color:#94a3b8;
margin-bottom:8px;
}

.level-badge{
display:inline-block;
background:#facc15;
color:#000;
padding:10px 18px;
border-radius:30px;
font-weight:700;
margin-top:10px;
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:30px;
}

.info-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
}

.info-card h3{
margin-bottom:15px;
color:#facc15;
}

.info-row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.info-row:last-child{
border-bottom:none;
}

@media(max-width:768px){

.info-grid{
grid-template-columns:1fr;
}

.profile-header{
text-align:center;
justify-content:center;
}

}
.edit-profile-section{
margin-top:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:30px;
border-radius:25px;
}

.edit-profile-section h2{
margin-bottom:25px;
color:#facc15;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.form-group{
margin-bottom:20px;
}

.form-group label{
display:block;
margin-bottom:8px;
}

.form-group input,
.form-group textarea{
width:100%;
padding:15px;
background:#1e293b;
border:none;
border-radius:12px;
color:white;
}

.form-group textarea{
height:120px;
resize:none;
}

.save-btn{
width:100%;
padding:16px;
border:none;
background:#facc15;
color:#000;
font-size:16px;
font-weight:700;
border-radius:12px;
cursor:pointer;
}

.profile-stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;
}

.stat-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
text-align:center;
}

.stat-card h2{
color:#facc15;
margin-bottom:10px;
}

@media(max-width:768px){

.form-grid{
grid-template-columns:1fr;
}

.profile-stats{
grid-template-columns:1fr;
}

}

  .profile-photo-section,
.security-section,
.verification-section{
margin-top:30px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:30px;
border-radius:25px;
}

.photo-container{
display:flex;
align-items:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

#profilePreview{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid #facc15;
}

#profileImage{
background:#1e293b;
padding:12px;
border-radius:12px;
color:white;
}

.password-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.change-password-btn{
margin-top:20px;
padding:15px 25px;
border:none;
background:#facc15;
color:#000;
font-weight:700;
border-radius:12px;
cursor:pointer;
}

.verify-badge{
display:inline-block;
margin-top:15px;
padding:15px 20px;
background:#22c55e;
border-radius:12px;
font-weight:700;
}

@media(max-width:768px){

.password-grid{
grid-template-columns:1fr;
}

  }
</style></head><body>
  
  <div id="sidebar-container"></div>
  
  <div class="main-content">

<div class="container">
    <div class="topbar">
    <div class="menu-btn" id="menuBtn">
        ☰
    </div>
    </div>

  
    <div class="profile-header"><div class="avatar" id="profileAvatar">
U
</div>
  
  <div class="profile-info"><h1 id="profileName">Loading...</h1>
    <p id="profileEmail">Loading...</p>
    <p id="memberSince">Loading...</p>
    
    <p id="verificationStatus">Loading...</p>
    
<div
class="level-badge"
id="levelBadge">
Loading...
</div>
  
  </div></div><div class="info-grid"><div class="info-card"><h3>Account Information</h3><div class="info-row">
<span>Username</span>
<span id="userName">Loading...</span>

    
</div><div class="info-row">
<span>User ID</span>
<span id="userId">Loading...</span>
  
</div><div class="info-row">
<span>Account Type</span>
<span id="accountRole">Loading...</span>
  
</div><div class="info-row">
<span>Status</span>
<span id="accountStatus">Loading...</span>
  
</div></div><div class="info-card"><h3>Earning Summary</h3><div class="info-row">
<span>Total Earnings</span>
<span id="totalEarnings">₹0.00</span>
  
</div><div class="info-row">
<span>Completed Tasks</span>
<span id="completedTasks">0</span>
  
</div>
<div class="info-row">

</div></div>

  </div>

  <script src="components/sidebar.js"></script>
    <script>
const API_BASE =
"https://coingrid-api.coingridcoingrid.workers.dev";

async function loadProfile() {

    

    try {

        const response = await fetch(
    `${API_BASE}/api/profile`,
    {
        credentials: "include"
    }
);

if(response.status === 401){

    window.location.href =
    "../auth/login.html";

    return;

}

        const data = await response.json();

        if (!data.success) {

            alert(data.message);

            return;

        }

        const profile = data.profile;

        document.getElementById("profileAvatar").textContent =
        profile.name.charAt(0).toUpperCase();

        document.getElementById("profileName").textContent =
        profile.name;

        document.getElementById("profileEmail").textContent =
        profile.email;

        document.getElementById("memberSince").textContent =
        "Member Since: " +
        new Date(profile.created_at).toLocaleDateString();

        document.getElementById("verificationStatus").textContent =
        profile.verified
            ? "✅ Verified Account"
            : "❌ Email Not Verified";

        document.getElementById("levelBadge").textContent =
        "Level " + profile.level;

        document.getElementById("userName").textContent =
        profile.name;

        const randomId =
"CG" + Math.floor(100000 + Math.random() * 900000);

document.getElementById("userId").textContent =
randomId;

        document.getElementById("accountRole").textContent =
        profile.role;

        document.getElementById("accountStatus").textContent =
        profile.status;

        document.getElementById("totalEarnings").textContent =
        "₹" +
        Number(profile.lifetime_earnings || 0).toFixed(2);

        document.getElementById("completedTasks").textContent =
        profile.completed_tasks || 0;

        document.getElementById("accountLevel").textContent =
        profile.level || 1;

    } catch (error) {

        console.error("Profile Error:", error);

        alert("Unable to load profile.");

    }

}

loadProfile();
    </script>

<script src="components/sidebar.js"></script>

</div>

</body>

</html>
