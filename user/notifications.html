<!DOCTYPE html><html lang="en"><head>
  <link rel="stylesheet" href="components/sidebar.css">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Notifications | CoinGrid</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:25px;
}

.container{
max-width:1200px;
margin:auto;
}

.page-header{
margin-bottom:30px;
}

.page-header h1{
font-size:38px;
margin-bottom:10px;
}

.page-header p{
color:#94a3b8;
}

.notifications-list{
display:flex;
flex-direction:column;
gap:20px;
}

.notification-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
display:flex;
align-items:flex-start;
gap:20px;
}

.notification-icon{
font-size:32px;
min-width:50px;
}

.notification-content{
flex:1;
}

.notification-content h3{
margin-bottom:8px;
}

.notification-content p{
color:#cbd5e1;
line-height:1.6;
margin-bottom:10px;
}

.notification-time{
color:#94a3b8;
font-size:14px;
}

.reward{
color:#22c55e;
}

.warning{
color:#f59e0b;
}

.info{
color:#3b82f6;
}

@media(max-width:768px){

.notification-card{
flex-direction:column;
}

.page-header h1{
font-size:30px;
}

}

  .filter-tabs{
display:flex;
gap:10px;
flex-wrap:wrap;
margin:25px 0;
}

.filter-btn{
padding:12px 18px;
border:none;
background:#1e293b;
color:white;
border-radius:30px;
cursor:pointer;
}

.filter-btn.active{
background:#facc15;
color:#000;
font-weight:700;
}

.action-bar{
display:flex;
gap:15px;
margin-bottom:25px;
flex-wrap:wrap;
}

.action-bar button,
.read-btn{
padding:12px 18px;
border:none;
background:#facc15;
color:#000;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.unread{
border-left:5px solid #facc15;
}

.read-btn{
margin-left:auto;
}

@media(max-width:768px){

.action-bar{
flex-direction:column;
}

.read-btn{
margin-left:0;
margin-top:10px;
}

  }


  .notification-summary{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.summary-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
padding:25px;
border-radius:20px;
text-align:center;
}

.summary-card h2{
color:#facc15;
font-size:36px;
margin-bottom:10px;
}

.live-status{
margin-top:25px;
padding:18px;
background:#1e293b;
border-radius:15px;
display:flex;
align-items:center;
gap:12px;
}

.status-dot{
width:12px;
height:12px;
border-radius:50%;
background:#22c55e;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

0%{
opacity:1;
}

50%{
opacity:.4;
}

100%{
opacity:1;
}

}

@media(max-width:768px){

.notification-summary{
grid-template-columns:1fr;
}

                      }

</style></head><body>

<div id="sidebar-container"></div>

<div class="main-content">

<div class="container">

<div class="topbar">

<div class="menu-btn" id="menuBtn">
☰
</div>

</div>

<div class="page-header">
  
  <h1>Notifications</h1><p>
Stay updated with your account activities and rewards.
</p></div>
<div
class="notifications-list"
id="notificationList">
</div>
  
<!-- FILTER TABS --><div class="filter-tabs"><button class="filter-btn active">
All
</button><button class="filter-btn">
Unread
</button><button class="filter-btn">
Rewards
</button><button class="filter-btn">
Withdrawals
</button><button class="filter-btn">
Tasks
</button></div><!-- ACTION BAR --><div class="action-bar"><button id="markAllRead">
Mark All Read
</button><button id="deleteSelected">
Delete Selected
</button></div><!-- READ / UNREAD EXAMPLES -->

  

  <!-- NOTIFICATION SUMMARY --><div class="notification-summary"><div class="summary-card"><h2 id="totalNotifications">
0
</h2><p>Total Notifications</p></div><div class="summary-card"><h2 id="unreadNotifications">
0
</h2><p>Unread Notifications</p></div><div class="summary-card"><h2 id="rewardNotifications">
0
</h2><p>Reward Updates</p></div></div><!-- LIVE STATUS --><div class="live-status"><span class="status-dot"></span>

Real-Time Notification Service Active

</div>
</div>

<script>

const API_BASE =
"https://coingrid-api.coingridcoingrid.workers.dev";

/* LOAD NOTIFICATIONS */

async function loadNotifications() {

    const user =
    JSON.parse(
        localStorage.getItem("coingrid_user")
    );

    if (!user || !user.id) {

        alert("User not logged in.");

        window.location.href =
        "../auth/login.html";

        return;

    }

    try {

        const response =
        await fetch(
`${API_BASE}/api/notifications?user_id=${user.id}`
        );

        const data =
        await response.json();

        if (!data.success) {

            alert(data.message);

            return;

        }

        /* SUMMARY */

        document.getElementById(
            "totalNotifications"
        ).textContent =
        data.summary.total;

        document.getElementById(
            "unreadNotifications"
        ).textContent =
        data.summary.unread;

        document.getElementById(
            "rewardNotifications"
        ).textContent =
        data.summary.reward;

        /* LIST */

        const list =
        document.getElementById(
            "notificationList"
        );

        list.innerHTML = "";

        if(data.notifications.length===0){

            list.innerHTML =

            `<div class="notification-card">

                <div class="notification-content">

                    <h3>No Notifications</h3>

                    <p>
                    You're all caught up.
                    </p>

                </div>

            </div>`;

            return;

        }

        data.notifications.forEach(item=>{

            let icon = "🔔";
            let iconClass = "info";

            const title =
            item.title.toLowerCase();

            if(title.includes("reward")){

                icon="💰";
                iconClass="reward";

            }

            else if(
            title.includes("withdraw")
            ){

                icon="🏦";
                iconClass="warning";

            }

            else if(
            title.includes("task")
            ){

                icon="📋";
                iconClass="info";

            }

            list.innerHTML += `

<div class="notification-card ${item.is_read ? "" : "unread"}">

<div class="notification-icon ${iconClass}">
${icon}
</div>

<div class="notification-content">

<h3>${item.title}</h3>

<p>${item.message}</p>

<div class="notification-time">

${item.created_at}

</div>

</div>

${
!item.is_read ?

`<button
class="read-btn"
onclick="markRead(${item.id})">

Mark Read

</button>`

:

""

}

</div>

`;

        });

    }

    catch(error){

        console.error(error);

        alert(
        "Unable to load notifications."
        );

    }

}

/* MARK READ */

async function markRead(id){

    await fetch(

`${API_BASE}/api/notifications/read`,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

notification_id:id

})

}

);

loadNotifications();

}

/* MARK ALL */

document
.getElementById(
"markAllRead"
)
.addEventListener(
"click",
async()=>{

const user =
JSON.parse(
localStorage.getItem(
"coingrid_user"
)
);

await fetch(

`${API_BASE}/api/notifications/read-all`,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:user.id

})

}

);

loadNotifications();

});

/* DELETE ALL READ NOTIFICATIONS */

document
.getElementById(
"deleteSelected"
)
.addEventListener(
"click",
async()=>{

const response =
await fetch(

`${API_BASE}/api/notifications?user_id=${
JSON.parse(
localStorage.getItem(
"coingrid_user"
)
).id
}`

);

const data =
await response.json();

for(const item of data.notifications){

if(item.is_read){

await fetch(

`${API_BASE}/api/notifications/delete`,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

notification_id:item.id

})

}

);

}

}

loadNotifications();

});

/* AUTO REFRESH */

setInterval(()=>{

loadNotifications();

},30000);

loadNotifications();

</script>

<script src="components/sidebar.js"></script>

</div>

</body>

</html>
