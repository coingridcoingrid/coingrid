<!DOCTYPE html><html lang="en"><head>
  <link rel="stylesheet" href="components/sidebar.css">
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Browse Tasks | CoinGrid</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
padding:25px;
}

.container{
max-width:1400px;
margin:auto;
}

/* HEADER */

.page-header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:20px;
margin-bottom:30px;
}

.page-header h1{
font-size:36px;
}

.page-header p{
color:#94a3b8;
margin-top:5px;
}

/* SEARCH */

.search-section{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.08);
margin-bottom:25px;
}

.search-box{
display:flex;
gap:15px;
flex-wrap:wrap;
}

.search-box input{
flex:1;
padding:16px;
background:#1e293b;
border:none;
border-radius:12px;
color:white;
}

.search-box button{
padding:16px 25px;
border:none;
border-radius:12px;
background:#facc15;
font-weight:700;
cursor:pointer;
}

/* FILTERS */

.filters{
display:flex;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

.filter-btn{
padding:12px 18px;
background:#1e293b;
border-radius:30px;
cursor:pointer;
transition:.3s;
}

.filter-btn.active,
.filter-btn:hover{
background:#facc15;
color:black;
font-weight:600;
}

/* STATS */

.stats-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:25px;
}

.stat-card{
background:rgba(255,255,255,0.05);
padding:25px;
border-radius:20px;
text-align:center;
border:1px solid rgba(255,255,255,0.08);
}

.stat-card h2{
color:#facc15;
margin-bottom:10px;
}

.sort-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:25px;
gap:15px;
flex-wrap:wrap;
}

.sort-bar select{
padding:12px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
}

/* TASK GRID PLACEHOLDER */

.task-grid{
margin-top:30px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

.placeholder{
background:rgba(255,255,255,0.05);
height:220px;
border-radius:20px;
border:1px solid rgba(255,255,255,0.08);
}

/* RESPONSIVE */

@media(max-width:991px){

.stats-grid{
grid-template-columns:1fr 1fr;
}

.task-grid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:600px){

.stats-grid,
.task-grid{
grid-template-columns:1fr;
}

.page-header h1{
font-size:28px;
}

}
  .section-title{
margin-top:35px;
margin-bottom:25px;
font-size:28px;
}

.task-card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:20px;
padding:25px;
transition:.3s;
}
.task-card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:15px;
margin-bottom:15px;
}
  
.task-card:hover{
transform:translateY(-5px);
}

.task-top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.reward{
font-size:24px;
font-weight:700;
color:#facc15;
}

.difficulty{
padding:8px 14px;
border-radius:30px;
font-size:12px;
font-weight:600;
}

.easy{
background:#22c55e;
color:white;
}

.medium{
background:#f59e0b;
color:white;
}

.hard{
background:#ef4444;
color:white;
}

.task-card h3{
margin-bottom:12px;
}

.task-card p{
color:#94a3b8;
line-height:1.7;
margin-bottom:20px;
}

.task-info{
display:flex;
justify-content:space-between;
margin-bottom:20px;
font-size:14px;
color:#cbd5e1;
}

.task-btn{
display:block;
text-align:center;
background:#facc15;
color:#000;
padding:14px;
border-radius:12px;
font-weight:700;
text-decoration:none;
}

.pagination{
display:flex;
justify-content:center;
gap:10px;
margin-top:40px;
flex-wrap:wrap;
}

.pagination button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
cursor:pointer;
}

.active-page{
background:#facc15 !important;
color:black !important;
font-weight:700;
}

</style></head><body>

<div id="sidebar-container"></div>

<div class="main-content">

<div class="container">
  <div class="topbar">
    <div class="menu-btn" id="menuBtn">
        ☰
    </div>
  </div>
  
  <div class="page-header"><div><h1>Browse Tasks</h1><p>
Find tasks and start earning rewards instantly.
</p></div></div><!-- SEARCH -->
  <div class="search-section">
  <div class="search-box">
<input
id="searchInput"
type="text"
placeholder="Search tasks...">

<button id="searchBtn">

Search

</button>
  </div>
    
    <div class="filters">

<div
class="filter-btn active"
data-category="All">
All
</div>

<div
class="filter-btn"
data-category="Surveys">
Surveys
</div>

<div
class="filter-btn"
data-category="Videos">
Videos
</div>

<div
class="filter-btn"
data-category="Apps">
Apps
</div>

<div
class="filter-btn"
data-category="Offers">
Offers
</div>

<div
class="filter-btn"
data-category="Social">
Social
</div>

    </div>
    
    
    <!-- STATS --><div class="stats-grid"><div class="stat-card"><h2 id="availableTasks">0</h2><p>Available Tasks</p></div>
  <div class="stat-card"><h2 id="totalRewards">$0.00</h2><p>Total Rewards</p></div>
  <div class="stat-card"><h2 id="newToday">0</h2><p>New Today</p></div>
  <div class="stat-card"><h2 id="approvalRate">0%</h2><p>Approval Rate</p></div></div><div class="sort-bar"><h3>Available Opportunities</h3>
    <select id="sortSelect"><option>Highest Reward</option>
<option>Newest First</option>
<option>Lowest Effort</option>
<option>Most Popular</option></select></div></div><!-- TASK CARDS WILL COME IN PART 2 -->
<!-- FEATURED TASKS --><h2 class="section-title">
🔥 Featured Tasks
</h2>
  
  <div
class="task-grid"
id="taskGrid">

  </div>
  
  <div class="pagination">

<button id="prevBtn">
⬅ Previous
</button>

<span id="pageNumber">
Page 1
</span>

<button id="nextBtn">
Next ➜
</button>

  </div>
  <!-- PAGINATION -->
  
</div>
<script>
const API_BASE =
"https://coingrid-api.coingridcoingrid.workers.dev";

let currentCategory = "All";

let currentSearch = "";

let currentSort = "newest";
let currentPage = 1;
async function loadTasks(){

    try{

        const url =
`${API_BASE}/api/tasks?category=${encodeURIComponent(currentCategory)}&search=${encodeURIComponent(currentSearch)}&sort=${currentSort}&page=${currentPage}`;

       const response =
await fetch(
    url,
    {
        credentials: "include"
    }
);

if (response.status === 401) {

    window.location.replace(
        "../auth/login.html"
    );

    return;

}

        const data =
        await response.json();

        if(!data.success){

            alert(data.message);

            return;

        }

        document.getElementById("availableTasks").textContent =
        data.stats.available_tasks;

        document.getElementById("totalRewards").textContent =
        "$" +
        Number(data.stats.total_rewards).toFixed(2);

        document.getElementById("newToday").textContent =
        data.stats.new_today;

        document.getElementById("approvalRate").textContent =
        data.stats.approval_rate + "%";

        const grid =
        document.getElementById("taskGrid");

        grid.innerHTML = "";

        if(data.tasks.length===0){

            grid.innerHTML =
            "<h3>No tasks available.</h3>";

            return;

        }

        data.tasks.forEach(task=>{

            const difficulty =
            task.reward>=5
            ? "hard"
            : task.reward>=2
            ? "medium"
            : "easy";

            const difficultyText =
            task.reward>=5
            ? "Hard"
            : task.reward>=2
            ? "Medium"
            : "Easy";

            grid.innerHTML += `

<div class="task-card">

<img
src="${task.thumbnail || 'assets/images/default-task.webp'}"
alt="${task.title}"
style="width:100%;height:180px;object-fit:cover;border-radius:15px;margin-bottom:15px;">

<div class="task-top">

<span class="reward">

$${Number(task.reward).toFixed(2)}

</span>

${
task.featured
? '<span class="difficulty easy">⭐ Featured</span>'
: `<span class="difficulty easy">Level ${task.required_pass_level}</span>`
}

</div>

<h3>${task.title}</h3>

<p>${task.short_description || task.description || ""}</p>

<div class="task-info">

<span>📂 ${task.category}</span>

<span>⏱ ${task.estimated_minutes} min</span>

</div>

<a
href="${task.redirect_url || `task-learning.html?id=${task.id}`}"
class="task-btn">

Learn & Start

</a>

</div>

`;

        });

      document.getElementById("pageNumber").textContent =
`Page ${currentPage}`;

    }catch(error){

        console.error(error);

        alert("Unable to load tasks.");

    }

}

document
.querySelectorAll(".filter-btn")
.forEach(button=>{

    button.addEventListener(
    "click",
    ()=>{

        document
        .querySelectorAll(".filter-btn")
        .forEach(btn=>
            btn.classList.remove("active")
        );

        button.classList.add("active");

        currentCategory =
        button.dataset.category;
currentPage = 1;
        loadTasks();

    });

});

document
.getElementById("searchBtn")
.addEventListener(
"click",
()=>{

    currentSearch =
    document
    .getElementById("searchInput")
    .value
    .trim();
currentPage = 1;
    loadTasks();

});

document
.getElementById("sortSelect")
.addEventListener("change", function () {

    switch(this.selectedIndex){

        case 0:
            currentSort = "reward";
            break;

        case 1:
            currentSort = "newest";
            break;

        case 2:
            currentSort = "oldest";
            break;

        default:
            currentSort = "newest";

    }

    currentPage = 1;
    loadTasks();

  

  
});
currentPage = 1;
loadTasks();
  document.getElementById("prevBtn").onclick = () => {

    if(currentPage > 1){

        currentPage--;

        loadTasks();

    }

};

document.getElementById("nextBtn").onclick = () => {

    currentPage++;

    loadTasks();

};

</script>

<script src="components/sidebar.js"></script>

</div>

</body>

</html>
